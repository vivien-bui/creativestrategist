<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hand-drawn style creative mark representing strategy and inspiration -->
  <!-- The design uses organic curves and slightly imperfect strokes for the Freehand aesthetic -->

  <!-- Main spiral/spark element representing creative energy -->
  <g stroke="#000000" stroke-width="2.2" opacity="0.95">
    <!-- Central spiral motion -->
    <path d="M 32 16 Q 40 16 44 24 T 40 40 Q 32 48 24 44" stroke-dasharray="none"/>

    <!-- Lower connecting curve -->
    <path d="M 24 44 Q 20 40 22 32" stroke-dasharray="none"/>
  </g>

  <!-- Accent marks for playful imperfection (Freehand style) -->
  <g stroke="#000000" stroke-width="1.8" opacity="0.85">
    <!-- Small radiating lines suggesting energy/inspiration -->
    <line x1="20" y1="12" x2="16" y2="8"/>
    <line x1="48" y1="20" x2="54" y2="14"/>
    <line x1="50" y1="44" x2="56" y2="50"/>
  </g>

  <!-- Dot element for balance -->
  <circle cx="32" cy="32" r="1.5" fill="#000000" opacity="0.9"/>
</svg>
